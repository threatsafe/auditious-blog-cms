name: Auditious Blog CMS CI

on:
  push:
    branches:
      - main
      - develop

  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Dependencies
        run: npm install

      - name: Generate Payload Types
        run: npm run generate:types

      - name: Skip ESLint
        run: echo "Skipping ESLint"

      - name: Build Application
        run: npm run build
